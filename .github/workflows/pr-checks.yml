name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Correctness
  # ---------------------------------------------------------------

  typecheck:
    name: TypeScript strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: ESLint + security plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  format:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --check "**/*.{ts,tsx,js,json,css}" --ignore-path .gitignore

  # ---------------------------------------------------------------
  # Tests — 304 unit tests with 80%+ coverage threshold
  # ---------------------------------------------------------------

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_HANDBOOK_BUCKET: handbook-test
      STORAGE_EVENTS_BUCKET: events-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-07-23T15-54-02Z \
            server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/ready && break
            sleep 1
          done
      - run: npm test -- --reporter=verbose --coverage

  build:
    name: Next.js production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # ---------------------------------------------------------------
  # Security — dependency vulnerabilities (all severities)
  # ---------------------------------------------------------------

  npm-audit:
    name: npm audit (all severities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit all deps (fail on any severity)
        run: npm audit

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ---------------------------------------------------------------
  # Security — static analysis (all OSS, no Advanced Security)
  # ---------------------------------------------------------------

  secrets-scan:
    name: Secrets / credential scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/react
            p/owasp-top-ten
            p/nodejs

  bearer:
    name: Bearer SAST (data flow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bearer security scan
        uses: bearer/bearer-action@v2
        with:
          severity: critical,high,warning
          exit-code: 1

  # ---------------------------------------------------------------
  # Security — dependency license compliance
  # ---------------------------------------------------------------

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check licenses
        run: |
          npx license-checker --production --failOn \
            "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0-only;AGPL-3.0-only;SSPL-1.0" \
            --summary

  # ---------------------------------------------------------------
  # Security — container image (every PR)
  # ---------------------------------------------------------------

  trivy-image:
    name: Trivy container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t brightwheel-app:scan .
      - name: Trivy vulnerability scan (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: brightwheel-app:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
