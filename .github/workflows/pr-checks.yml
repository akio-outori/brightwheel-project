name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------
# Correctness
# ---------------------------------------------------------------

jobs:
  typecheck:
    name: TypeScript strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  format:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prettier --check "**/*.{ts,tsx,js,json,css}" --ignore-path .gitignore

  # ---------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------

  unit-tests:
    name: Unit tests (1325+)
    runs-on: ubuntu-latest
    env:
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_HANDBOOK_BUCKET: handbook-test
      STORAGE_EVENTS_BUCKET: events-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # GH Actions services don't support custom commands, so we
      # start MinIO as a regular docker container in the step.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-07-23T15-54-02Z \
            server /data
          # Wait for MinIO to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/ready && break
            sleep 1
          done
      - run: npm test -- --reporter=verbose

  build:
    name: Next.js production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # ---------------------------------------------------------------
  # Security — vulnerabilities
  # ---------------------------------------------------------------

  npm-audit:
    name: npm audit (critical + high)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high
      - name: Audit all deps (informational)
        run: npm audit --audit-level=critical
        continue-on-error: true

  # ---------------------------------------------------------------
  # Security — static analysis
  # ---------------------------------------------------------------

  secrets-scan:
    name: Secrets / credential scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    # CodeQL requires GitHub Advanced Security enabled on the repo.
    # For private repos on free/team plans this may not be available.
    # The job is non-blocking so the PR isn't held up by a feature
    # that needs manual enablement; once Advanced Security is turned
    # on, remove continue-on-error to make it a hard gate.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/react
            p/owasp-top-ten
            p/nodejs

  # ---------------------------------------------------------------
  # Security — dependency license compliance
  # ---------------------------------------------------------------

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check licenses
        run: |
          npx license-checker --production --failOn \
            "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0-only;AGPL-3.0-only;SSPL-1.0" \
            --summary

  # ---------------------------------------------------------------
  # Security — container image (if Dockerfile changed)
  # ---------------------------------------------------------------

  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files_names || '', 'Dockerfile') || contains(github.event.pull_request.changed_files_names || '', 'docker')
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t brightwheel-app:scan .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: brightwheel-app:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
