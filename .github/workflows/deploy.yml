name: Deploy to Railway

# Runs on every push to main and uploads the current commit to the
# Railway "app" service. MinIO is a static image with a persistent
# volume — it's not redeployed here; only the app changes.
#
# The CLI is pinned to a specific version on purpose: Railway's CLI
# has had breaking changes across minor versions in the past, and a
# floating `latest` means a green build on Monday can silently break
# on Wednesday. Bump this deliberately when you want to upgrade.
#
# Token setup — IMPORTANT:
# This workflow uses an ACCOUNT-SCOPED Railway token, passed via the
# RAILWAY_API_TOKEN env var (not RAILWAY_TOKEN — that variable is
# only for project-scoped tokens and will be rejected by the CLI if
# it contains an account token). Generate the token from Railway
# dashboard → Account Settings → Tokens → "Create New Token".
#
# Because an account token is not scoped to a single project, the
# workflow runs `railway link` with explicit project, environment,
# and service arguments before `railway up`. Those IDs come from
# the RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID, and
# RAILWAY_SERVICE_ID GitHub secrets. To find them, run
# `railway status --json` from a linked local checkout.
#
# Paste the token without any surrounding whitespace. If this step
# ever starts failing with "Unauthorized", the token was revoked —
# regenerate it and update the RAILWAY_API_TOKEN secret.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy app to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI (pinned)
        run: npm install -g @railway/cli@4.36.1

      - name: Show Railway CLI version
        run: railway --version

      - name: Link Railway project
        run: |
          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            --service "$RAILWAY_SERVICE_ID"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Deploy
        run: |
          set -e
          echo "::group::railway up --service app --ci --detach"
          if ! railway up --service app --ci --detach; then
            echo ""
            echo "::error::Railway deploy failed. If the error above says 'Unauthorized',"
            echo "::error::the RAILWAY_API_TOKEN secret is invalid or revoked — regenerate"
            echo "::error::a token in Railway dashboard (Account Settings → Tokens) and run"
            echo "::error::gh secret set RAILWAY_API_TOKEN to update it."
            exit 1
          fi
          echo "::endgroup::"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
